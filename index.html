<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Galeria Dinâmica ❤️</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f7f9fc;
        color: #333;
        padding: 20px;
    }

    header {
        text-align: center;
        margin-bottom: 30px;
        padding: 20px 0;
    }

    header h1 {
        font-size: 2.5rem;
        color: #e63946;
        margin-bottom: 5px;
    }

    header p {
        font-size: 1.1rem;
        color: #666;
    }

    .gallery {
        column-count: 4;
        column-gap: 15px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .gallery-item {
        display: inline-block;
        width: 100%;
        margin-bottom: 15px;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        background-color: #fff;
    }

    .gallery-item:hover {
        transform: scale(1.03);
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    .gallery-item img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
    }

    @media (max-width: 1024px) {
        .gallery {
            column-count: 3;
        }
    }

    @media (max-width: 768px) {
        .gallery {
            column-count: 2;
        }
    }

    @media (max-width: 480px) {
        .gallery {
            column-count: 2;
        }
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        max-width: 95%;
        max-height: 90%;
        border-radius: 8px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    }

    .close-btn {
        position: absolute;
        top: 20px;
        right: 30px;
        color: #fff;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>
<body>

    <header>
        <h1>Nossos Momentos - Gabriel e Geo</h1>
        <p>Feito com Amor ❤️</p>
    </header>

    <main class="gallery" id="galeria"></main>

    <div class="modal" id="photoModal">
        <span class="close-btn" id="closeBtn">&times;</span>
        <img class="modal-content" id="modalImg" src="">
    </div>

    <script>
        const galeria = document.getElementById('galeria');
        const modal = document.getElementById('photoModal');
        const modalImg = document.getElementById('modalImg');
        const closeBtn = document.getElementById('closeBtn');

        function embaralhar(lista) {
            for (let i = lista.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [lista[i], lista[j]] = [lista[j], lista[i]];
            }
            return lista;
        }

        fetch('imagens.json')
            .then(response => response.json())
            .then(arquivos => {
                const arquivosEmbaralhados = embaralhar(arquivos);

                arquivosEmbaralhados.forEach(caminhoImagem => {
                    
                    const item = document.createElement('div');
                    item.classList.add('gallery-item');

                    const img = document.createElement('img');
                    img.src = caminhoImagem;
                    img.alt = "Foto de Gabriel e Geo";

                    img.addEventListener('click', () => {
                        modalImg.src = caminhoImagem;
                        modal.classList.add('active');
                    });

                    item.appendChild(img);
                    galeria.appendChild(item);
                });
            })
            .catch(erro => console.error('Erro ao carregar as fotos:', erro));

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    </script>
</body>
</html>
